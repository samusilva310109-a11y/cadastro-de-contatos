<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="./js/app.js" defer type="module"></script>
    <script src="./js/main.js" defer></script>
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/style.css">
    <title>Contatos</title>
</head>
<body>
    <main>
        <div class="forms-container">
            <div class="title-forms-container">
                <h1>Formulário de Cadastro de Contato</h1> 
            </div>
             
    
            <div class="formulario">
                <div>
                    <div class="info-container">
                        <label for="inp-nome">Nome</label>
                        <input type="text" id="inp-nome" placeholder="Ex.: Antônio Silva">
                    </div>
                    <div class="info-container">
                        <label for="inp-cel">Celular</label>
                        <input type="tel" id="inp-cel" placeholder="Ex.: 11 9 1234-5678">
                    </div>
                    <div class="info-container">
                        <label for="inp-foto">Foto</label>
                        <input type="text" id="inp-foto" placeholder="Ex.: https://antonio-silva.jpg">
                    </div>
                </div>
    
                <div>
                    <div class="info-container">
                        <label for="inp-email">Email</label>
                        <input type="email" id="inp-email" placeholder="Ex.: silva.antonio@gmail.com">
                    </div>
                    <div class="info-container">
                        <label for="inp-endereco">Endereço</label>
                        <input type="text" id="inp-endereco" placeholder="Ex.: Rua jaçanã, 777">
                    </div>
                    <div class="info-container">
                        <label for="inp-cidade">Cidade</label>
                        <input type="text" id="inp-cidade" placeholder="Ex.: Carapicuíba">
                    </div>
                </div>
            </div>
            
        </div>
        
        
    </main>
    <div class="button-container" id="btn-container">
        <button id="btn-salvar">Salvar</button> 
    </div>
    
    <div class="table-container" >
            <table id="table">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Foto</th>
                        <th>Número</th>
                        <th>Email</th>
                        <th>Endereço</th>
                        <th>Cidade</th>
                        <th>Ação</th>
                    </tr>
                    
                </thead>
                <tbody id="table-body">
                    
                </tbody>
            </table>
        </div>
    
</body>
</html>
